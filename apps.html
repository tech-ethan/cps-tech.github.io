<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Application Library · Installer Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 32px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    nav {
      margin-bottom: 24px;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      margin-right: 16px;
    }

    input.search {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 24px;
      border-radius: 10px;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-header img {
      width: 40px;
      height: 40px;
    }

    .card-header h2 {
      font-size: 1.05rem;
      margin: 0;
    }

    .card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .download,
    .copy {
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .download {
      background: var(--accent);
      color: white;
    }

    .copy {
      background: #1f2937;
      color: var(--text);
    }

    /* Installer badges */
    .installer-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-left: auto;
    }

    .badge-exe { background: #3b82f6; }
    .badge-msi { background: #a855f7; }
    .badge-zip { background: #22c55e; }
    .badge-winget { background: #af6330; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #020617;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }

      .modal.hidden {
        display: none;
      }

      .modal-content {
        background: var(--card);
        border-radius: 14px;
        width: 90%;
        max-width: 540px;
        padding: 24px;
      }

      .modal-close {
        float: right;
        background: none;
        border: none;
        font-size: 1.5rem;
        color: var(--muted);
        cursor: pointer;
      }

      .modal-version{
        color: #FFF8DC;
        font-style: italic;
      }

      .modal-header {
        display: flex;
        gap: 14px;
        align-items: center;
        margin-bottom: 12px;
      }

      .modal-header img {
        width: 48px;
        height: 48px;
      }

      .modal-section {
        margin-top: 16px;
      }

      .modal-section pre {
        background: #020617;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.85rem;
      }

      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 16px;
      }

      
      pre,
      .code,
      .install-command {
        white-space: pre-wrap;
        word-break: break-word;
        overflow-wrap: anywhere;
      }

  


    /* Navigation bar */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .nav-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      opacity: 0.9;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .breadcrumbs {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

<body>

<nav class="nav">
  <div class="nav-left">
    <span class="nav-title">Installer Hub</span>
  </div>

  <div class="nav-links">
    <a href="index.html" data-page="index">Profiles</a>
    <a href="apps.html" data-page="apps">Application Library</a>
    <a href="reports.html" data-page="reports">Reports & Logs</a>
    <a href="webapps.html" data-page="webapps">Webapp Library</a>
  </div>
</nav>

<div class="breadcrumbs">
  <a href="index.html">Installer Hub</a> › <span>Application Library</span>
</div>

<div id="toast" class="toast">
  <span id="toast-icon">📋</span>
  <span id="toast-text">Copied</span>
</div>

<h1>Application Library</h1>
<p class="subtitle">Browse, search, and copy installer links</p>

<input
  class="search"
  type="search"
  placeholder="Search applications…"
  oninput="filterApps(this.value)"
>

<div class="grid" id="app-grid"></div>

<footer>
  Internal installer repository · Hosted on GitHub Pages
</footer>


<div id="app-modal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">×</button>

    <div class="modal-header">
      <img id="modal-icon">
      <div>
        <h2 id="modal-title"></h2>
        <p id="modal-version" class="modal-version"></p>
        <p id="modal-developer"></p>
      </div>
    </div>

    <p id="modal-description"></p>

    <div class="modal-section">
      <h4>Install Information</h4>
      <pre id="modal-install"></pre>
    </div>

    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>


<script>
let apps = {};

async function loadApps() {
  const resp = await fetch("./apps.json");
  apps = await resp.json();
  renderApps();
}

function renderApps() {
  const grid = document.getElementById("app-grid");
  grid.innerHTML = "";

  Object.values(apps).forEach(app => {
    if (!app.installer || !app.installer.type) return;

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const img = document.createElement("img");
    img.src = app.icon || "";
    header.appendChild(img);

    const title = document.createElement("h2");
    title.innerText = app.name;
    header.appendChild(title);

    const badge = document.createElement("span");
    const type = app.installer.type.toLowerCase();
    badge.className = "installer-badge badge-" + type;
    badge.innerText = type.toUpperCase();
    header.appendChild(badge);

    card.appendChild(header);

    const desc = document.createElement("p");
    desc.innerText = app.description || "";
    card.appendChild(desc);

    const actions = document.createElement("div");
    actions.className = "actions";

    // --- Winget action ---
    if (app.installer.type === "winget") {
      const wingetCmd =
        `winget install --id ${app.installer.id} ` +
        `--silent --accept-package-agreements --accept-source-agreements`;

      const copyWinget = document.createElement("button");
      copyWinget.className = "copy";
      copyWinget.innerText = "Copy Winget";
      copyWinget.onclick = (e) => {
        e.stopPropagation();
        navigator.clipboard.writeText(wingetCmd);
        showToast("Winget command copied", "📋");
      };

      actions.appendChild(copyWinget);
    }

    // --- Download action (direct URL or fallback) ---
    const downloadUrl =
      app.installer.url ||
      app.installer.fallback?.url;

    if (downloadUrl) {
      const download = document.createElement("a");
      download.className = "download";
      download.href = downloadUrl;
      download.innerText = "Download";
      download.onclick = e => {
        e.stopPropagation();
        showToast("Download started", "👇");
      };
      actions.appendChild(download);

      const copyBtn = document.createElement("button");
      copyBtn.className = "copy";
      copyBtn.innerText = "Copy URL";
      copyBtn.onclick = e => {
        e.stopPropagation();
        navigator.clipboard.writeText(downloadUrl);
        showToast("Installer URL copied", "📎");
      };
      actions.appendChild(copyBtn);
    }

    card.appendChild(actions);

    // --- Card click for modal ---
    card.onclick = () => openAppModal(app);

    grid.appendChild(card);
  });
}



function openAppModal(app) {
  document.getElementById("modal-icon").src = app.icon || "";
  document.getElementById("modal-title").innerText = app.name;
  document.getElementById("modal-version").innerText = app.version || "Version Not Available";
  document.getElementById("modal-developer").innerText =
    app.developer ? `Developed By ${app.developer}` : "";
  document.getElementById("modal-description").innerText =
    app.description || "";

  const installer = app.installer;
  const installBox = document.getElementById("modal-install");


  const website = document.createElement("a");
  website.className = "download"; // or whatever button style you’re using
  website.href = app.website;
  website.target = "_blank";
  website.rel = "noopener";
  website.innerText = "Website";


  if (installer.type === "winget") {
    installBox.innerText =
      `winget install --id ${installer.id} --silent --accept-package-agreements --accept-source-agreements`;
  } else {
    installBox.innerText = installer.url;
  }

  const actions = document.getElementById("modal-actions");
  actions.innerHTML = "";

  if (installer.type === "winget") {
    const copyWinget = document.createElement("button");
    copyWinget.className = "copy";
    copyWinget.innerText = "Copy Winget Command";
    copyWinget.onclick = () => {
      navigator.clipboard.writeText(installBox.innerText);
      showToast("Winget command copied", "📎");
    }
      
    actions.appendChild(copyWinget);
  }

  if (installer.url) {
    const dl = document.createElement("a");
    dl.className = "download";
    dl.href = installer.url;
    dl.innerText = "Download Installer";
    actions.appendChild(dl);
  }

  if (app.website) {
    const site = document.createElement("a");
    site.className = "download";
    site.href = app.website;
    site.target = "_blank";
    site.rel = "noopener";
    site.innerText = "Website";
    actions.appendChild(site);
  }

  document.getElementById("app-modal").classList.remove("hidden");
}

function closeModal() {
  document.getElementById("app-modal").classList.add("hidden");
}


function filterApps(q) {
  q = q.toLowerCase();
  document.querySelectorAll("#app-grid .card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(q)
      ? "block"
      : "none";
  });
}

function showToast(text, icon) {
  const toast = document.getElementById("toast");
  document.getElementById("toast-text").innerText = text;
  document.getElementById("toast-icon").innerText = icon;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

(function highlightActiveNav() {
  const page = location.pathname.split("/").pop() || "index.html";

  document.querySelectorAll(".nav-links a").forEach(link => {
    if (
      (page === "index.html" && link.dataset.page === "index") ||
      (page === "apps.html" && link.dataset.page === "apps")
    ) {
      link.classList.add("active");
    }
  });
})();

loadApps();
</script>

</body>
</html>
