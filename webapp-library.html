<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webapp Library · Installer Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 32px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    nav {
      margin-bottom: 24px;
    }

    nav a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      margin-right: 16px;
    }

    input.search {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 24px;
      border-radius: 10px;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-header img {
      width: 40px;
      height: 40px;
    }

    .card-header h2 {
      font-size: 1.05rem;
      margin: 0;
    }

    .card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .download,
    .copy {
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .download {
      background: var(--accent);
      color: white;
    }

    .copy {
      background: #1f2937;
      color: var(--text);
    }

    /* Installer badges */
    .installer-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-left: auto;
    }

    .badge-exe { background: #3b82f6; }
    .badge-msi { background: #a855f7; }
    .badge-zip { background: #22c55e; }
    .badge-winget { background: #64748b; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #020617;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--muted);
    }

    /* Navigation bar */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .nav-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      opacity: 0.9;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .breadcrumbs {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

<body>

<nav class="nav">
  <div class="nav-left">
    <span class="nav-title">Installer Hub</span>
  </div>

  <div class="nav-links">
    <a href="index.html" data-page="index">Profiles</a>
    <a href="apps.html" data-page="apps">Application Library</a>
    <a href="reports.html" data-page="reports">Reports & Logs</a>
    <a href="reports.html" data-page="reports">Webapp Library</a>
  </div>
</nav>

<div class="breadcrumbs">
  <a href="index.html">Installer Hub</a> › <span>Webapp Library</span>
</div>

<div id="toast" class="toast">
  <span id="toast-icon">📋</span>
  <span id="toast-text">Copied</span>
</div>

<h1>Webapp Library</h1>
<p class="subtitle">Browse, search, and copy installer links</p>

<input
  class="search"
  type="search"
  placeholder="Search applications…"
  oninput="filterApps(this.value)"
>

<div class="grid" id="app-grid"></div>

<footer>
  Internal installer repository · Hosted on GitHub Pages
</footer>

<script>
let apps = {};

async function loadApps() {
  const resp = await fetch("./apps.json");
  apps = await resp.json();
  renderApps();
}

function renderApps() {
  const grid = document.getElementById("app-grid");
  grid.innerHTML = "";

  Object.values(apps).forEach(app => {
    if (!app.installer || !app.installer.url) return;

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const img = document.createElement("img");
    img.src = app.icon || "";
    header.appendChild(img);

    const title = document.createElement("h2");
    title.innerText = app.name;
    header.appendChild(title);

    const badge = document.createElement("span");
    const type = app.installer.type.toLowerCase();
    badge.className = "installer-badge badge-" + type;
    badge.innerText = type.toUpperCase();
    header.appendChild(badge);

    card.appendChild(header);

    const desc = document.createElement("p");
    desc.innerText = app.description || "";
    card.appendChild(desc);

    const actions = document.createElement("div");
    actions.className = "actions";

    const download = document.createElement("a");
    download.className = "download";
    download.href = app.installer.url;
    download.innerText = "Download";

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy";
    copyBtn.innerText = "Copy URL";
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(app.installer.url);
      showToast("Installer URL copied", "📎");
    };

    actions.appendChild(download);
    actions.appendChild(copyBtn);
    card.appendChild(actions);

    grid.appendChild(card);
  });
}

function filterApps(q) {
  q = q.toLowerCase();
  document.querySelectorAll("#app-grid .card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(q)
      ? "block"
      : "none";
  });
}

function showToast(text, icon) {
  const toast = document.getElementById("toast");
  document.getElementById("toast-text").innerText = text;
  document.getElementById("toast-icon").innerText = icon;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

(function highlightActiveNav() {
  const page = location.pathname.split("/").pop() || "index.html";

  document.querySelectorAll(".nav-links a").forEach(link => {
    if (
      (page === "index.html" && link.dataset.page === "index") ||
      (page === "apps.html" && link.dataset.page === "apps")
    ) {
      link.classList.add("active");
    }
  });
})();

loadApps();
</script>

</body>
</html>
