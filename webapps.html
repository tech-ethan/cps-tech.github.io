<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Webapp Library · Installer Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #3b82f6;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 32px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    /* ---------------- Navigation ---------------- */

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .nav-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      opacity: 0.9;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .breadcrumbs {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
    }

    /* ---------------- Search ---------------- */

    input.search {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 24px;
      border-radius: 10px;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    /* ---------------- Grid & Cards ---------------- */

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 24px;
    }

    .card {
      min-height: 240px;
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      display: flex;
      flex-direction: column;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 14px;
    }

    .card-header-content {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .card-header img {
      width: 40px;
      height: 40px;
    }

    .card-header h2 {
      font-size: 1.15rem;
      margin: 0;
      line-height: 1.3;
      flex: 1 1 auto;
      max-width: 100%;
    }

    .card p {
      font-size: 0.9rem;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.4;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* ---------------- Buttons ---------------- */

    .link {
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      background: var(--accent);
      color: white;
      text-decoration: none;
      display: inline-block;
    }

    .link:hover {
      background: #2563eb;
    }

    .copy {
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }

    .copy {
      background: #1f2937;
      color: var(--text);
    }

    /* ---------------- Usage Badges ---------------- */

    .usage-badge {
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
      margin-left: auto;
      white-space: nowrap;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .usage-technology         { background: #22c55e; }
    .usage-district           { background: #8a1f1f; }
    .usage-custodial          { background: #b5f63b; color: #020617; }
    .usage-library            { background: #d73bf6; }
    .usage-classified         { background: #f68f3b; }
    .usage-theatre            { background: #0f4fb8; }
    .usage-certified          { background: #7306a5; }

    /* ---------------- Toast ---------------- */

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #020617;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      z-index: 9999;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: var(--muted);
    }
  </style>
</head>

<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-left">
      <span class="nav-title">Installer Hub</span>
    </div>

    <div class="nav-links">
      <a href="index.html" data-page="index">Profiles</a>
      <a href="apps.html" data-page="apps">Apps</a>
      <a href="reports.html" class="reports">Reports</a>
      <a href="webapps.html" data-page="webapps">Webapp Library</a>
    </div>
  </nav>

  <!-- Breadcrumbs -->
  <div class="breadcrumbs">
    <a href="Installer Hub">Installer Hub</a> > <span>Webapp Library</span>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast">
    <span id="toast-icon">📋</span>
    <span id="toast-text">Copied</span>
  </div>

  <!-- Page Header -->
  <h1>Webapp Library</h1>
  <p class="subtitle">Browse, search, and copy webapp links</p>

  <!-- Search -->
  <input
    class="search"
    type="search"
    placeholder="Search web applications…"
    oninput="filterApps(this.value)"
  >

  <!-- Webapp Grid -->
  <div class="grid" id="webapp-grid"></div>


<footer>
  Internal installer repository · Hosted on GitHub Pages
</footer>

<script>
let webapps = {};

async function loadWebApps() {
  try {
    const resp = await fetch("./webapps.json");
    webapps = await resp.json();
    console.log("Loaded webapps:", webapps);
    renderWebApps();
  }
  catch (err) {
    console.error("Failed to load webapps.json", err);
  }
}

function renderWebApps() {
  const grid = document.getElementById("webapp-grid");
  grid.innerHTML = "";

  (webapps instanceof Array ? webapps : Object.values(webapps))
    .forEach(webapp => {

    const card = document.createElement("div");
    card.className = "card";

    const header = document.createElement("div");
    header.className = "card-header";

    const img = document.createElement("img");
    img.src = webapp.icon || "";
    header.appendChild(img);

    const content = document.createElement("div");
    content.className = "card-header-content";
    header.appendChild(content);

    const title = document.createElement("h2");
    title.innerText = webapp.name;
    header.appendChild(title);

    // Container for usage badges
    const badgeWrap = document.createElement("div");
    badgeWrap.style.display = "flex";
    badgeWrap.style.gap = "6px";
    badgeWrap.style.flexWrap = "wrap";

    header.appendChild(badgeWrap);


    if (webapp.usage) {
        const usages = Array.isArray(webapp.usage)
        ? webapp.usage
        : [webapp.usage];

      usages.forEach(u => {
        if (typeof u !== "string") return;

        const usage = document.createElement("span");
        usage.className = `usage-badge usage-${u.toLowerCase()}`;
        usage.innerText = u.toUpperCase();

        badgeWrap.appendChild(usage);
        header.appendChild(usage);
      });
    }

    card.appendChild(header);

    const desc = document.createElement("p");
    desc.innerText = webapp.description || "";
    card.appendChild(desc);

    const actions = document.createElement("div");
    actions.className = "actions";

    const linkBtn = document.createElement("a");
    linkBtn.className = "link";
    linkBtn.href = webapp.link;
    linkBtn.target = "_blank";
    linkBtn.rel = "noopener";
    linkBtn.innerText = "Open";

    const copyBtn = document.createElement("button");
    copyBtn.className = "copy";
    copyBtn.innerText = "Copy Link";
    copyBtn.onclick = () => {
      navigator.clipboard.writeText(webapp.link);
      showToast("Webapp link copied", "📎");
    };

    actions.appendChild(linkBtn);
    actions.appendChild(copyBtn);
    card.appendChild(actions);
    grid.appendChild(card);
  });
}

function filterApps(q) {
  q = q.toLowerCase();
  document.querySelectorAll("#webapp-grid .card").forEach(card => {
    card.style.display = card.innerText.toLowerCase().includes(q)
      ? "block"
      : "none";
  });
}

function showToast(text, icon) {
  const toast = document.getElementById("toast");
  document.getElementById("toast-text").innerText = text;
  document.getElementById("toast-icon").innerText = icon;
  toast.classList.add("show");
  setTimeout(() => toast.classList.remove("show"), 2000);
}

(function highlightActiveNav() {
  const page = location.pathname.split("/").pop() || "index.html";
  document.querySelectorAll(".nav-links a").forEach(link => {
    if (page === "webapps.html" && link.dataset.page === "webapps") {
      link.classList.add("active");
    }
  });
})();

loadWebApps();
</script>


</body>
</html>
