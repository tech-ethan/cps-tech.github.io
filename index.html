<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Installer Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --accent: #3b82f6;
      --accent2: #1f4685;
      --accent3: #0e1f3b;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      font-family: Inter, Segoe UI, Roboto, sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      padding: 32px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 6px;
    }

    p.subtitle {
      color: var(--muted);
      margin-bottom: 24px;
    }

    input.search {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 24px;
      border-radius: 10px;
      border: none;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .card-header img {
      width: 40px;
      height: 40px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .download, .copy {
      padding: 10px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      border: none;
      cursor: pointer;
    }

    .download { background: var(--accent); color: white; }
    .copy { background: var(--accent2); color: white; }

    /* -------- PROFILE CARD (COLLAPSIBLE) -------- */

    .profile-card {
      background: #030820;
      margin-top: 16px;
      border-radius: 14px;
      padding: 24px;
      overflow: hidden;

      max-height: 0;
      opacity: 0;
      transform: translateY(-8px);

      transition:
        max-height 0.45s ease,
        opacity 0.3s ease,
        transform 0.3s ease;
    }

    .profile-card.expanded {
      max-height: 3000px;
      opacity: 1;
      transform: translateY(0);
    }

    .profile-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 42px;
      margin-top: 12px;
    }

    .profile-app-card {
      background: #020617;
      width: 215px;
      border-radius: 12px;
      padding: 32px;
    }

    .profile-app-header {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .profile-app-header img {
      width: 32px;
      height: 32px;
    }

    .profile-app-desc {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 6px;
    }

    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 700;
      color: white;
    }

    .badge-exe { background: #3b82f6; }
    .badge-msi { background: #a855f7; }
    .badge-zip { background: #22c55e; }
    .badge-winget { background: #f59e0b; }

    pre {
      background: #020617;
      border-radius: 10px;
      padding: 12px;
      font-size: 0.85rem;
      margin-top: 16px;
    }

    /* -------- TOAST -------- */

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #020617;
      color: #e5e7eb;
      padding: 12px 16px;
      border-radius: 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      z-index: 10000;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .nav-title {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      opacity: 0.9;
    }

    .nav-links {
      display: flex;
      gap: 16px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-weight: 600;
      padding-bottom: 4px;
      border-bottom: 2px solid transparent;
      transition: color 0.2s ease, border-color 0.2s ease;
    }

    .nav-links a:hover {
      color: var(--text);
    }

    .nav-links a.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .breadcrumbs {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 24px;
    }

    .breadcrumbs a {
      color: var(--accent);
      text-decoration: none;
    }

  </style>
</head>

<body>

<nav class="nav">
  <div class="nav-left">
    <span class="nav-title">Installer Hub</span>
  </div>

  <div class="nav-links">
    <a href="index.html" data-page="index">Profiles</a>
    <a href="apps.html" data-page="apps">Application Library</a>
    <a href="reports.html" data-page="reports">Reports & Logs</a>
    <a href="webapps.html" data-page="webapps">Webapp Library</a>
  </div>
</nav>

<div class="breadcrumbs">
  <a href="index.html">Installer Hub</a> › <span>Profiles</span>
</div>

<div id="toast" class="toast">
  <span id="toast-icon">✅</span>
  <span id="toast-text">Copied</span>
</div>

<h1>Installer Hub</h1>
<p class="subtitle">Centralized, profile‑driven workstation deployments</p>

<div class="card">
  <h2>Quick Setup Profiles</h2>
  <p>Select a setup type for this machine</p>

  <div class="actions" id="profile-buttons"></div>

  <div id="profile-card" class="profile-card">
    <h3 id="profile-title"></h3>
    <p id="profile-desc" class="subtitle"></p>
    <div id="profile-badges"></div>

    <h4 style="margin-top:16px">What gets installed</h4>
    <div id="profile-apps" class="profile-grid"></div>

    <pre id="ps-command"></pre>
    <button class="copy" onclick="copyCommand()">Copy PowerShell Command</button>
  </div>
</div>

<script>
let apps = {};
let profiles = {};
let selectedProfile = null;

fetch("./apps.json").then(r => r.json()).then(j => apps = j);
fetch("./profiles.json").then(r => r.json()).then(j => {
  profiles = j;
  renderProfiles();
});

function renderProfiles() {
  const wrap = document.getElementById("profile-buttons");
  Object.keys(profiles).forEach(k => {
    const b = document.createElement("button");
    b.className = "download";
    b.innerText = profiles[k].name;
    b.onclick = () => toggleProfile(k);
    wrap.appendChild(b);
  });
}

function toggleProfile(key) {
  const card = document.getElementById("profile-card");

  if (selectedProfile === key && card.classList.contains("expanded")) {
    card.classList.remove("expanded");
    selectedProfile = null;
    return;
  }

  selectedProfile = key;
  setProfile(key);
  card.classList.add("expanded");

  card.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function setProfile(key) {
  const p = profiles[key];

  document.getElementById("profile-title").innerText = p.name;
  document.getElementById("profile-desc").innerText = p.description;

  const appsBox = document.getElementById("profile-apps");
  appsBox.innerHTML = "";

  p.apps.forEach(id => {
    const a = apps[id];
    if (!a) return;

    const c = document.createElement("div");
    c.className = "profile-app-card";

    const h = document.createElement("div");
    h.className = "profile-app-header";

    const img = document.createElement("img");
    img.src = a.icon;
    h.appendChild(img);

    const t = document.createElement("div");
    t.textContent = a.name;
    h.appendChild(t);

    const badge = document.createElement("span");
    badge.className = `badge badge-${a.installer.type}`;
    badge.textContent = a.installer.type.toUpperCase();
    h.appendChild(badge);

    c.appendChild(h);

    const d = document.createElement("div");
    d.className = "profile-app-desc";
    d.textContent = a.description;
    c.appendChild(d);

    appsBox.appendChild(c);
  });

  document.getElementById("ps-command").innerText =
    `$env:INSTALLER_PROFILE="${key}"; iwr https://tech-ethan.github.io/cps-tech.github.io/bootstrap.ps1 -useb | iex`;
}

function renderApps() {
  const grid = document.getElementById("app-grid");
  Object.values(apps).forEach(a => {
    const c = document.createElement("div");
    c.className = "card";
    c.innerHTML = `
      <div class="card-header">
        <img src}
        <h2>${a.name}</h2>
      </div>
      <p>${a.description}</p>
      <a class="download" href="${a.url}" target="_blank">Download</a>
    `;
    grid.appendChild(c);
  });
}
renderApps();

function filterCards(q) {
  document.querySelectorAll("#app-grid .card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(q.toLowerCase())
      ? "block" : "none";
  });
}

function copyCommand() {
  navigator.clipboard.writeText(
    document.getElementById("ps-command").innerText
  ).then(() => showToast("PowerShell command copied", "📋"));
}

function showToast(text, icon) {
  document.getElementById("toast-text").innerText = text;
  document.getElementById("toast-icon").innerText = icon;
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") {
    document.getElementById("profile-card").classList.remove("expanded");
    selectedProfile = null;
  }
});

(function highlightActiveNav() {
  const page = location.pathname.split("/").pop() || "index.html";

  document.querySelectorAll(".nav-links a").forEach(link => {
    if (
      (page === "index.html" && link.dataset.page === "index") ||
      (page === "apps.html" && link.dataset.page === "apps")
    ) {
      link.classList.add("active");
    }
  });
})();
</script>

</body>
</html>
